<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Lengkapi Biodata - AFWEB CODE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm mx-auto" style="max-width: 500px;">
            <div class="card-body">
                <h4 class="fw-bold mb-4">Formulir Biodata</h4>
                <form id="formBiodata">
                    <input type="hidden" id="p-id">
                    <div class="mb-3"><label>Nama Lengkap</label><input type="text" id="nama_lengkap"
                            class="form-control" required></div>
                    <div class="mb-3"><label>NIK</label><input type="text" id="nik" class="form-control" required></div>
                    <div class="mb-3"><label>Tempat Lahir</label><input type="text" id="tempat_lahir"
                            class="form-control" required></div>
                    <div class="mb-3"><label>Tanggal Lahir</label><input type="date" id="tgl_lahir" class="form-control"
                            required></div>
                    <div class="mb-3">
                        <label>Agama</label>
                        <select id="agama" class="form-select" required>
                            <option value="">Pilih Agama</option>
                            <option>Islam</option>
                            <option>Kristen</option>
                            <option>Katolik</option>
                            <option>Hindu</option>
                            <option>Buddha</option>
                            <option>Konghucu</option>
                        </select>
                    </div>
                    <div class="mb-3"><label>Kewarganegaraan</label><input type="text" id="kewarganegaraan"
                            class="form-control" placeholder="Contoh: WNI" required></div>
                    <div class="mb-3">
                        <label>Status Kawin</label>
                        <select id="status_kawin" class="form-select" required>
                            <option value="">Pilih Status</option>
                            <option>Belum Kawin</option>
                            <option>Kawin</option>
                            <option>Cerai Hidup</option>
                            <option>Cerai Mati</option>
                        </select>
                    </div>
                    <div class="mb-3"><label>No. Telpon / WA</label><input type="tel" id="no_telp" class="form-control"
                            required></div>
                    <div class="mb-3"><label>Alamat Lengkap</label><textarea id="alamat" class="form-control"
                            required></textarea></div>
                    <div class="mb-3">
                        <label>Pendidikan Terakhir</label>
                        <select id="pendidikan" class="form-select" name="pendidikan" required>
                            <option value="">Pilih Pendidikan</option>
                            <option>SD</option>
                            <option>SMP</option>
                            <option>SMA/SMK</option>
                            <option>D1</option>
                            <option>D2</option>
                            <option>D3</option>
                            <option>D4</option>
                            <option>S1</option>
                            <option>S2</option>
                            <option>S3</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Foto KTP (Wajib)</label>
                        <input type="file" id="foto_ktp" name="foto_ktp" class="form-control" accept="image/*" required>
                    </div>
                    <div class="mb-3">
                        <label>Foto Wajah (Wajib)</label>
                        <input type="file" id="foto_wajah" name="foto_wajah" class="form-control" accept="image/*"
                            required>
                    </div>
                    <div class="mb-4">
                        <label>Foto / Scan Ijazah Terakhir (Wajib)</label>
                        <input type="file" id="foto_ijazah" name="foto_ijazah" class="form-control" accept="image/*,application/pdf"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Kirim Biodata</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Ambil ID dari URL
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('p-id').value = urlParams.get('id');

        document.getElementById('formBiodata').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('pelamar_id', document.getElementById('p-id').value);
            formData.append('nama_lengkap', document.getElementById('nama_lengkap').value);
            formData.append('nik', document.getElementById('nik').value);
            formData.append('tempat_lahir', document.getElementById('tempat_lahir').value);
            formData.append('tgl_lahir', document.getElementById('tgl_lahir').value);
            formData.append('agama', document.getElementById('agama').value);
            formData.append('kewarganegaraan', document.getElementById('kewarganegaraan').value);
            formData.append('status_kawin', document.getElementById('status_kawin').value);
            formData.append('no_telp', document.getElementById('no_telp').value);
            formData.append('alamat', document.getElementById('alamat').value);
            formData.append('pendidikan', document.getElementById('pendidikan').value);
            formData.append('foto_ktp', document.getElementById('foto_ktp').files[0]);
            formData.append('foto_wajah', document.getElementById('foto_wajah').files[0]);
            formData.append('foto_ijazah', document.getElementById('foto_ijazah').files[0]);

            const res = await fetch('/api/biodata/submit', {
                method: 'POST',
                body: formData
            });
            if (res.ok) {
                alert('Biodata berhasil dikirim!');
                window.location.reload();
            } else {
                alert('Terjadi kesalahan sistem saat mengirim data. Pastikan server sudah direstart.');
            }
        };
    </script>
</body>

</html>
